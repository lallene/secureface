name: SecureFace CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build application
        run: go build -v ./...

      - name: Run tests
        run: go test -v ./...
