services:
  postgres:
    image: postgres:16-alpine
    container_name: secureface-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartface_db
 
    volumes:
      - secureface_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartface_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: secureface-api
    container_name: secureface-api
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  secureface_pgdata: